<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Login / Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="lang.js"></script>
    <style>
        /* ===== BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Roboto", sans-serif;
        }

        /* ================================================================ */
        /*  CUSTOM TOASTS                                                  */
        /* ================================================================ */
        .custom-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            z-index: 9999;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideInRight 0.4s ease;
            backdrop-filter: blur(10px);
            font-size: 15px;
        }

        .custom-toast.success {
            background: rgba(34, 197, 94, 0.9);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .custom-toast.error {
            background: rgba(239, 68, 68, 0.9);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .custom-toast.warning {
            background: rgba(234, 179, 8, 0.9);
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .custom-toast.info {
            background: rgba(59, 130, 246, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .custom-toast.fade-out {
            animation: slideOutRight 0.3s ease forwards;
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* ================================================================ */
        /*  THEMES                                                         */
        /* ================================================================ */

        /* ----- LIGHT THEME ----- */
        body.light-theme .wrapper {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            color: #1a1a2e;
        }

        body.light-theme .bottom-links-outer {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
        }

        body.light-theme .wrapper h1,
        body.light-theme .wrapper .title-wrapper h1 {
            color: #1a1a2e;
        }

        body.light-theme .wrapper .btn {
            background: #4f46e5;
            color: #fff;
        }

        body.light-theme .wrapper .btn:hover {
            background: #4338ca;
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.3);
        }

        body.light-theme .custom-checkbox {
            color: rgba(0, 0, 0, 0.8);
        }

        body.light-theme .lang-btn {
            color: #1a1a2e;
        }

        /* ----- COLOR THEME ----- */
        body.color-theme .wrapper {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        body.color-theme .bottom-links-outer {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        body.color-theme .custom-checkbox {
            color: rgba(255, 255, 255, 0.85);
        }

        body.color-theme .wrapper .btn {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff;
        }

        body.color-theme .wrapper .btn:hover {
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
            transform: translateY(-2px);
        }

        /* ----- DARK THEME ----- */
        body.dark-theme .wrapper {
            background: rgba(0, 0, 0, 0.75);
            border-color: rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 1;
        }

        body.dark-theme .bottom-links-outer {
            background: rgba(0, 0, 0, 0.75);
            border-color: rgba(255, 255, 255, 0.08);
        }

        /* ================================================================ */
        /*  BUTTONS & LINKS                                                */
        /* ================================================================ */

        button,
        .btn,
        #regBtn,
        #loginBtn,
        #showLoginBtn,
        #showRegisterBtn,
        a,
        .bottom-links-outer a {
            cursor: pointer !important;
        }

        .btn,
        #regBtn,
        #loginBtn,
        #showLoginBtn,
        #showRegisterBtn {
            text-decoration: none !important;
        }

        .btn:hover,
        #regBtn:hover,
        #loginBtn:hover,
        #showLoginBtn:hover,
        #showRegisterBtn:hover {
            text-decoration: none !important;
        }

        /* ================================================================ */
        /*  SMOOTH TRANSITIONS                                              */
        /* ================================================================ */
        .wrapper,
        .wrapper .btn,
        .wrapper .input-box,
        .wrapper .toggle-buttons,
        .wrapper .title-wrapper,
        .bottom-links-outer,
        .settings-panel,
        .bg-image,
        .bg-color {
            transition: all 0.4s ease !important;
        }

        .toggle-buttons button {
            transition: background 0.4s ease, color 0.4s ease !important;
        }

        .wrapper .btn {
            transition: background 0.4s ease, color 0.4s ease, transform 0.3s ease !important;
        }

        /* ===== LANGUAGE BUTTON ===== */
        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #fff;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 44px;
            justify-content: center;
            font-weight: 600;
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        body.light-theme .lang-btn {
            color: #1a1a2e;
        }

        /* ================================================================ */
        /*  BACKGROUND CONTAINER                                           */
        /* ================================================================ */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('123.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateX(0);
            opacity: 1;
            pointer-events: none;
        }

        .bg-image.hide {
            transform: translateX(100%) scale(0.8);
            opacity: 0;
        }

        .bg-color {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: background 0.8s ease, opacity 0.8s ease;
            opacity: 0;
            pointer-events: none;
        }

        .bg-color.show {
            opacity: 1;
        }

        /* ================================================================ */
        /*  BODY                                                          */
        /* ================================================================ */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            background: transparent;
            position: relative;
        }

        /* ================================================================ */
        /*  MAIN WRAPPER                                                   */
        /* ================================================================ */
        .wrapper {
            width: 100%;
            max-width: 440px;
            margin: 20px auto 10px auto;
            padding: 35px 30px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            color: #ffffff;
            position: relative;
            overflow: hidden;
            transition: all 0.6s ease;
            opacity: 0;
            transform: translateY(-60px) scale(0.97);
            animation: wrapperSlideDown 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            z-index: 1;
        }

        @keyframes wrapperSlideDown {
            0% {
                opacity: 0;
                transform: translateY(-60px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .wrapper>*,
        .wrapper .input-box,
        .wrapper .btn,
        .wrapper .toggle-buttons,
        .wrapper .title-wrapper {
            opacity: 0;
        }

        /* ================================================================ */
        /*  TOGGLE BUTTONS                                                 */
        /* ================================================================ */
        .toggle-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            transform: translateY(-30px);
            animation: toggleSlideDown 0.6s ease 0.15s forwards;
        }

        @keyframes toggleSlideDown {
            0% {
                opacity: 0;
                transform: translateY(-30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toggle-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .toggle-buttons button:active {
            transform: scale(0.95);
        }

        /* ================================================================ */
        /*  TITLE                                                         */
        /* ================================================================ */
        .title-wrapper {
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            animation: contentFadeIn 0.5s ease 0.25s forwards;
        }

        .title-wrapper h1 {
            font-size: 36px;
            font-weight: 700;
            transition: all 0.4s ease;
            position: absolute;
            width: 100%;
            text-align: center;
        }

        .title-wrapper h1.slide-up {
            transform: translateY(-70px) scale(0.8);
            opacity: 0;
        }

        .title-wrapper h1.slide-down {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        @keyframes contentFadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ================================================================ */
        /*  FORMS                                                         */
        /* ================================================================ */
        .form-container {
            position: relative;
            z-index: 1;
            overflow: visible;
        }

        .form-container.hide {
            display: none;
        }

        .form-container.show {
            display: block;
            animation: fadeSlide 0.4s ease forwards;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ================================================================ */
        /*  INPUT FIELDS                                                   */
        /* ================================================================ */
        .wrapper .input-box {
            width: 100%;
            height: 50px;
            margin: 22px 0;
            position: relative;
            transition: all 0.4s ease;
            transform: translateX(0);
            opacity: 0;
        }

        .wrapper .input-box.slide-left {
            transform: translateX(-60px) !important;
            opacity: 0 !important;
        }

        .wrapper .input-box.slide-right {
            transform: translateX(60px) !important;
            opacity: 0 !important;
        }

        .input-box input {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.06) !important;
            border: 2px solid rgba(255, 255, 255, 0.25);
            outline: none;
            border-radius: 40px;
            font-size: 16px;
            color: #fff;
            padding: 0 24px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-box input:-webkit-autofill,
        .input-box input:-webkit-autofill:hover,
        .input-box input:-webkit-autofill:focus,
        .input-box input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.3) inset !important;
            -webkit-text-fill-color: #ffffff !important;
            background-color: rgba(0, 0, 0, 0.3) !important;
            background: rgba(0, 0, 0, 0.3) !important;
            border-color: rgba(255, 255, 255, 0.25) !important;
            transition: background-color 5000s ease-in-out 0s !important;
        }

        .input-box input:-moz-autofill {
            background: rgba(0, 0, 0, 0.3) !important;
            color: #ffffff !important;
        }

        .input-box input:focus {
            border-color: #4f46e5;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
            transform: scale(1.02);
        }

        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Light theme */
        body.light-theme .input-box input {
            background: rgba(255, 255, 255, 0.7) !important;
            border: 2px solid rgba(0, 0, 0, 0.1);
            color: #1a1a2e;
        }

        body.light-theme .input-box input:-webkit-autofill,
        body.light-theme .input-box input:-webkit-autofill:hover,
        body.light-theme .input-box input:-webkit-autofill:focus,
        body.light-theme .input-box input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px rgba(255, 255, 255, 0.7) inset !important;
            -webkit-text-fill-color: #1a1a2e !important;
            background-color: rgba(255, 255, 255, 0.7) !important;
            background: rgba(255, 255, 255, 0.7) !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
            transition: background-color 5000s ease-in-out 0s !important;
        }

        body.light-theme .input-box input:-moz-autofill {
            background: rgba(255, 255, 255, 0.7) !important;
            color: #1a1a2e !important;
        }

        body.light-theme .input-box input:focus {
            border-color: #4f46e5;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
        }

        body.light-theme .input-box input::placeholder {
            color: rgba(0, 0, 0, 0.4);
        }

        /* Color theme */
        body.color-theme .input-box input {
            background: rgba(255, 255, 255, 0.06) !important;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        body.color-theme .input-box input:-webkit-autofill,
        body.color-theme .input-box input:-webkit-autofill:hover,
        body.color-theme .input-box input:-webkit-autofill:focus,
        body.color-theme .input-box input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px rgba(255, 255, 255, 0.1) inset !important;
            -webkit-text-fill-color: #fff !important;
            background-color: rgba(255, 255, 255, 0.1) !important;
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
            transition: background-color 5000s ease-in-out 0s !important;
        }

        body.color-theme .input-box input:-moz-autofill {
            background: rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
        }

        body.color-theme .input-box input:focus {
            border-color: #7c3aed;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2);
        }

        body.color-theme .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* ================================================================ */
        /*  CUSTOM CHECKBOX                                                */
        /* ================================================================ */
        .custom-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14.5px;
            color: rgba(255, 255, 255, 0.85);
            user-select: none;
            position: relative;
            z-index: 1;
        }

        .custom-checkbox:hover {
            color: #ffffff;
        }

        .custom-checkbox input {
            display: none;
        }

        .checkmark {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .custom-checkbox:hover .checkmark {
            border-color: #a5b4fc;
            transform: scale(1.05);
        }

        .custom-checkbox:active .checkmark {
            transform: scale(0.9);
        }

        .custom-checkbox input:checked+.checkmark {
            background: #4f46e5;
            border-color: #4f46e5;
            animation: checkPop 0.3s ease;
        }

        .checkmark::after {
            content: '';
            position: absolute;
            display: none;
            left: 5px;
            top: 1px;
            width: 6px;
            height: 11px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) scale(0);
            transition: transform 0.2s ease;
        }

        .custom-checkbox input:checked+.checkmark::after {
            display: block;
            animation: checkMarkAppear 0.3s ease forwards;
        }

        @keyframes checkMarkAppear {
            0% {
                transform: rotate(45deg) scale(0);
            }

            50% {
                transform: rotate(45deg) scale(1.3);
            }

            100% {
                transform: rotate(45deg) scale(1);
            }
        }

        @keyframes checkPop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        /* ================================================================ */
        /*  АНИМАЦИИ ДЛЯ REMEMBER ME & FORGOT PASSWORD                     */
        /* ================================================================ */

        /* Slide in from left — для REMEMBER ME */
        @keyframes slideInLeftRemember {
            0% {
                opacity: 0;
                transform: translateX(-60px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Slide in from right — для FORGOT PASSWORD */
        @keyframes slideInRightForgot {
            0% {
                opacity: 0;
                transform: translateX(60px);
            }

            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ================================================================ */
        /*  REMEMBER ME & FORGOT PASSWORD — СИНЕЕ ПОДЧЁРКИВАНИЕ            */
        /* ================================================================ */

        /* Верхняя ссылка "Forgot password?" */
        #forgotPassword {
            position: relative !important;
            text-decoration: none !important;
        }

        #forgotPassword::after {
            content: '' !important;
            position: absolute !important;
            bottom: -2px !important;
            left: 0 !important;
            width: 0 !important;
            height: 2px !important;
            background: #4f46e5 !important;
            transition: width 0.3s ease !important;
        }

        #forgotPassword:hover::after {
            width: 100% !important;
        }

        #forgotPassword:hover {
            color: #4f46e5 !important;
        }

        /* Светлая тема */
        body.light-theme #forgotPassword {
            color: #1a1a2e !important;
        }

        body.light-theme #forgotPassword::after {
            background: #4f46e5 !important;
        }

        body.light-theme #forgotPassword:hover {
            color: #4f46e5 !important;
        }

        /* Цветная тема */
        body.color-theme #forgotPassword {
            color: #ffffff !important;
        }

        body.color-theme #forgotPassword::after {
            background: #4f46e5 !important;
        }

        body.color-theme #forgotPassword:hover {
            color: #4f46e5 !important;
        }

        /* ================================================================ */
        /*  НИЖНИЕ ССЫЛКИ (Sign Up / Login) — СИНЕЕ ПОДЧЁРКИВАНИЕ         */
        /* ================================================================ */

        .bottom-links-outer a {
            position: relative !important;
            text-decoration: none !important;
            color: rgba(255, 255, 255, 0.8) !important;
            transition: color 0.3s ease !important;
        }

        .bottom-links-outer a::after {
            content: '' !important;
            position: absolute !important;
            bottom: -2px !important;
            left: 0 !important;
            width: 0 !important;
            height: 2px !important;
            background: #4f46e5 !important;
            transition: width 0.3s ease !important;
        }

        .bottom-links-outer a:hover {
            color: #4f46e5 !important;
        }

        .bottom-links-outer a:hover::after {
            width: 100% !important;
        }

        /* Светлая тема — нижние ссылки */
        body.light-theme .bottom-links-outer a {
            color: rgba(0, 0, 0, 0.7) !important;
        }

        body.light-theme .bottom-links-outer a::after {
            background: #4f46e5 !important;
        }

        body.light-theme .bottom-links-outer a:hover {
            color: #4f46e5 !important;
        }

        /* Цветная тема — нижние ссылки */
        body.color-theme .bottom-links-outer a {
            color: rgba(255, 255, 255, 0.85) !important;
        }

        body.color-theme .bottom-links-outer a::after {
            background: #4f46e5 !important;
        }

        body.color-theme .bottom-links-outer a:hover {
            color: #4f46e5 !important;
        }

        /* ================================================================ */
        /*  BUTTONS                                                        */
        /* ================================================================ */
        .wrapper .btn {
            width: 100%;
            height: 45px;
            background: white;
            border: none;
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            font-size: 16px;
            color: #333;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            display: block;
        }

        .wrapper .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.3);
            background: #f8faff;
        }

        .wrapper .btn:active {
            transform: scale(0.96);
        }

        /* ================================================================ */
        /*  BOTTOM LINKS                                                   */
        /* ================================================================ */
        .bottom-links-outer {
            width: 100%;
            max-width: 440px;
            text-align: center;
            font-size: 14.5px;
            min-height: 30px;
            line-height: 30px;
            margin: 0 auto;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            z-index: 1;
            transition: all 0.3s ease;
        }

        .bottom-links-outer .hidden-link {
            display: none;
        }

        .bottom-links-outer .visible-link {
            display: inline;
        }

        /* ================================================================ */
        /*  SETTINGS PANEL                                                 */
        /* ================================================================ */
        .settings-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;

            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-10vh) rotate(720deg);

            0% {

                transform: translateX(-60px);

            100% {

                transform: translateX(0);

        /* Slide in from right */

            100% {

                transform: translateX(0);

        }

        /* Bottom links */
        .bottom-links-outer {

    </style>
</head>

        // ====================================================================

        function updateBackground(color) {

        // ====================================================================
        //  GLASS STYLES
        // ====================================================================
        function applyGlassStyles(color, opacity) {
            const wrapper = document.querySelector('.wrapper');
            const bottomLinks = document.querySelector('.bottom-links-outer');
            if (!wrapper) return;
            if (!color) color = document.getElementById('glassColorPicker').value;
            if (opacity === undefined) opacity = parseFloat(document.getElementById('glassOpacity').value);
            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);
            const bgColor = `rgba(${r}, ${g}, ${b}, ${opacity})`;
            wrapper.style.background = bgColor;
            wrapper.style.backdropFilter = 'blur(16px)';
            if (bottomLinks) {
                bottomLinks.style.background = bgColor;
                bottomLinks.style.backdropFilter = 'blur(16px)';
            }
            localStorage.setItem('customGlassColor', color);
            localStorage.setItem('customGlassOpacity', opacity);
        }

        // ====================================================================
        //  BUTTONS & LINKS
        // ====================================================================
        function updateAllButtons(theme) {
            const showLoginBtn = document.getElementById('showLoginBtn');
            const showRegisterBtn = document.getElementById('showRegisterBtn');
            const loginBtn = document.getElementById('loginBtn');
            const regBtn = document.getElementById('regBtn');
            const isLoginActive = document.getElementById('loginForm').classList.contains('show');

            let activeStyle, inactiveStyle;
            if (theme === 'color') {
                activeStyle = { background: 'linear-gradient(135deg, #7c3aed, #4f46e5)', color: 'white' };
                inactiveStyle = { background: '#e5e7eb', color: '#333' };
            } else {
                activeStyle = { background: '#4f46e5', color: 'white' };
                inactiveStyle = { background: '#e5e7eb', color: '#333' };
            }

            if (isLoginActive) {
                Object.assign(showLoginBtn.style, activeStyle);
                Object.assign(showRegisterBtn.style, inactiveStyle);
            } else {
                Object.assign(showLoginBtn.style, inactiveStyle);
                Object.assign(showRegisterBtn.style, activeStyle);
            }
            if (isLoginActive) {
                Object.assign(loginBtn.style, activeStyle);
                Object.assign(regBtn.style, inactiveStyle);
            } else {
                Object.assign(loginBtn.style, inactiveStyle);
                Object.assign(regBtn.style, activeStyle);
            }
        }

        function updateLinksColor(theme) {
            const forgotLink = document.getElementById('forgotPassword');
            const bottomLinks = document.querySelectorAll('.bottom-links-outer a');
            [forgotLink, ...bottomLinks].forEach(link => {
                if (link) {
                    link.removeEventListener('mouseenter', link._enterHandler);
                    link.removeEventListener('mouseleave', link._leaveHandler);
                    const color = theme === 'color' ? '#a78bfa' : '#4f46e5';
                    const enterHandler = function () { this.style.color = color; };
                    const leaveHandler = function () { this.style.color = 'rgba(255, 255, 255, 0.8)'; };
                    link._enterHandler = enterHandler;
                    link._leaveHandler = leaveHandler;
                    link.addEventListener('mouseenter', enterHandler);
                    link.addEventListener('mouseleave', leaveHandler);
                }
            });
        }

        // ====================================================================
        //  THEMES
        // ====================================================================
        window.setTheme = function (theme) {
            const body = document.body;
            const titleRegister = document.getElementById('titleRegister');
            let currentTheme = 'dark';
            if (body.classList.contains('light-theme')) currentTheme = 'light';
            else if (body.classList.contains('color-theme')) currentTheme = 'color';

            body.classList.remove('dark-theme', 'light-theme', 'color-theme');

            if (theme === 'dark') {
                body.classList.add('dark-theme');
                document.getElementById('themeDark').style.borderColor = '#4f46e5';
                document.getElementById('themeLight').style.borderColor = 'transparent';
                document.getElementById('themeColor').style.borderColor = 'transparent';
                titleRegister.style.color = '';
            } else if (theme === 'light') {
                body.classList.add('light-theme');
                document.getElementById('themeDark').style.borderColor = 'transparent';
                document.getElementById('themeLight').style.borderColor = '#4f46e5';
                document.getElementById('themeColor').style.borderColor = 'transparent';
                titleRegister.style.color = '';
            } else if (theme === 'color') {
                body.classList.add('color-theme');
                document.getElementById('themeDark').style.borderColor = 'transparent';
                document.getElementById('themeLight').style.borderColor = 'transparent';
                document.getElementById('themeColor').style.borderColor = '#4f46e5';
                titleRegister.style.color = '#a78bfa';
            }

            localStorage.setItem('appTheme', theme);

            if (currentTheme === 'color' && theme !== 'color') {
                const showLoginBtn = document.getElementById('showLoginBtn');
                const showRegisterBtn = document.getElementById('showRegisterBtn');
                const loginBtn = document.getElementById('loginBtn');
                const regBtn = document.getElementById('regBtn');
                const isLoginActive = document.getElementById('loginForm').classList.contains('show');
                const tempStyle = { background: '#4f46e5', color: 'white' };
                const tempInactive = { background: '#e5e7eb', color: '#333' };
                if (isLoginActive) {
                    Object.assign(showLoginBtn.style, tempStyle);
                    Object.assign(showRegisterBtn.style, tempInactive);
                    Object.assign(loginBtn.style, tempStyle);
                    Object.assign(regBtn.style, tempInactive);
                } else {
                    Object.assign(showLoginBtn.style, tempInactive);
                    Object.assign(showRegisterBtn.style, tempStyle);
                    Object.assign(loginBtn.style, tempInactive);
                    Object.assign(regBtn.style, tempStyle);
                }
                setTimeout(() => {
                    updateAllButtons(theme);
                    updateLinksColor(theme);
                    const savedGlass = localStorage.getItem('customGlassColor');
                    const savedOpacity = localStorage.getItem('customGlassOpacity');
                    if (savedGlass && savedOpacity) applyGlassStyles(savedGlass, parseFloat(savedOpacity));
                    else applyGlassStyles();
                }, 50);
            } else {
                setTimeout(() => {
                    updateAllButtons(theme);
                    updateLinksColor(theme);
                    const savedGlass = localStorage.getItem('customGlassColor');
                    const savedOpacity = localStorage.getItem('customGlassOpacity');
                    if (savedGlass && savedOpacity) applyGlassStyles(savedGlass, parseFloat(savedOpacity));
                    else applyGlassStyles();
                }, 80);
            }
        };

        (function () {
            const savedTheme = localStorage.getItem('appTheme') || 'dark';
            window.setTheme(savedTheme);
        })();

        // ====================================================================
        //  CUSTOMIZATION
        // ====================================================================
        let isCustomizeOpen = false;
        window.toggleCustomize = function () {
            const panel = document.getElementById('customizePanel');
            isCustomizeOpen = !isCustomizeOpen;
            panel.style.display = isCustomizeOpen ? 'block' : 'none';
        };

        document.getElementById('bgColorPicker').addEventListener('input', function () {
            const color = this.value;
            document.getElementById('bgColorInput').value = color;
            updateBackground(color);
        });

        document.getElementById('bgColorInput').addEventListener('change', function () {
            const color = this.value;
            if (color.match(/^#[0-9a-fA-F]{6}$/)) {
                document.getElementById('bgColorPicker').value = color;
                updateBackground(color);
            }
        });

        document.getElementById('glassColorPicker').addEventListener('input', function () {
            const color = this.value;
            document.getElementById('glassColorInput').value = color;
            applyGlassStyles(color);
        });

        document.getElementById('glassColorInput').addEventListener('change', function () {
            const color = this.value;
            if (color.match(/^#[0-9a-fA-F]{6}$/)) {
                document.getElementById('glassColorPicker').value = color;
                applyGlassStyles(color);
            }
        });

        document.getElementById('glassOpacity').addEventListener('input', function () {
            const opacity = parseFloat(this.value);
            document.getElementById('glassOpacityValue').textContent = opacity.toFixed(2);
            applyGlassStyles(undefined, opacity);
        });

        window.resetColors = function () {
            localStorage.removeItem('customBgColor');
            localStorage.removeItem('customGlassColor');
            localStorage.removeItem('customGlassOpacity');
            localStorage.removeItem('bgImageHidden');
            document.getElementById('bgColorPicker').value = '#1a0b2e';
            document.getElementById('bgColorInput').value = '#1a0b2e';
            document.getElementById('glassColorPicker').value = '#000000';
            document.getElementById('glassColorInput').value = '#000000';
            document.getElementById('glassOpacity').value = '0.45';
            document.getElementById('glassOpacityValue').textContent = '0.45';
            bgImage.classList.remove('hide');
            bgColor.classList.remove('show');
            isCustomBgActive = false;
            applyGlassStyles('#000000', 0.45);
            window.setTheme('color');
            setTimeout(() => window.setTheme('color'), 50);
        };

        (function () {
            const savedBg = localStorage.getItem('customBgColor');
            const savedGlass = localStorage.getItem('customGlassColor');
            const savedOpacity = localStorage.getItem('customGlassOpacity');
            const bgHidden = localStorage.getItem('bgImageHidden');
            if (savedBg && bgHidden === 'true') {
                document.getElementById('bgColorPicker').value = savedBg;
                document.getElementById('bgColorInput').value = savedBg;
                bgImage.classList.add('hide');
                bgColor.style.background = savedBg;
                bgColor.classList.add('show');
                isCustomBgActive = true;
            } else {
                bgImage.classList.remove('hide');
                bgColor.classList.remove('show');
                isCustomBgActive = false;
            }
            if (savedGlass && savedOpacity) {
                document.getElementById('glassColorPicker').value = savedGlass;
                document.getElementById('glassColorInput').value = savedGlass;
                document.getElementById('glassOpacity').value = savedOpacity;
                document.getElementById('glassOpacityValue').textContent = parseFloat(savedOpacity).toFixed(2);
                applyGlassStyles(savedGlass, parseFloat(savedOpacity));
            } else {
                applyGlassStyles('#000000', 0.45);
            }
        })();

        // ====================================================================
        //  FORM SWITCHING
        // ====================================================================
        const titleLogin = document.getElementById('titleLogin');
        const titleRegister = document.getElementById('titleRegister');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const linkToRegisterOuter = document.getElementById('linkToRegisterOuter');
        const linkToLoginOuter = document.getElementById('linkToLoginOuter');

        function switchToLogin() {
            titleLogin.className = 'slide-down';
            titleRegister.className = 'slide-up';
            loginForm.className = 'form-container show';
            registerForm.className = 'form-container hide';
            linkToRegisterOuter.className = 'visible-link';
            linkToLoginOuter.className = 'hidden-link';
            const body = document.body;
            let currentTheme = 'dark';
            if (body.classList.contains('light-theme')) currentTheme = 'light';
            else if (body.classList.contains('color-theme')) currentTheme = 'color';
            updateAllButtons(currentTheme);
            updateLinksColor(currentTheme);
        }

        function switchToRegister() {
            titleLogin.className = 'slide-up';
            titleRegister.className = 'slide-down';
            loginForm.className = 'form-container hide';
            registerForm.className = 'form-container show';
            linkToRegisterOuter.className = 'hidden-link';
            linkToLoginOuter.className = 'visible-link';
            const body = document.body;
            let currentTheme = 'dark';
            if (body.classList.contains('light-theme')) currentTheme = 'light';
            else if (body.classList.contains('color-theme')) currentTheme = 'color';
            updateAllButtons(currentTheme);
            updateLinksColor(currentTheme);
        }

        document.getElementById('showLoginBtn').addEventListener('click', function (e) {
            e.preventDefault();
            switchToLogin();
        });
        document.getElementById('showRegisterBtn').addEventListener('click', function (e) {
            e.preventDefault();
            switchToRegister();
        });
        document.getElementById('goToRegisterOuter').addEventListener('click', function (e) {
            e.preventDefault();
            switchToRegister();
        });
        document.getElementById('goToLoginOuter').addEventListener('click', function (e) {
            e.preventDefault();
            switchToLogin();
        });

        // ====================================================================
        //  CUSTOM TOASTS
        // ====================================================================
        function showToast(message, type = 'info', duration = 3000) {
            const oldToasts = document.querySelectorAll('.custom-toast');
            oldToasts.forEach(toast => toast.remove());

            const toast = document.createElement('div');
            toast.className = `custom-toast ${type}`;
            toast.textContent = message;

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        function showSuccess(message) { showToast(message, 'success'); }
        function showError(message) { showToast(message, 'error'); }
        function showWarning(message) { showToast(message, 'warning'); }
        function showInfo(message) { showToast(message, 'info'); }

        // ====================================================================
        //  PARTICLES
        // ====================================================================
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 25;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                particle.style.animationDelay = (Math.random() * 15) + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(particle);
            }
        }
        createParticles();

        // ====================================================================
        //  PRESETS COLORS
        // ====================================================================
        window.applyPreset = function (name) {
            const presets = {
                ocean: { bg: '#0077b6', glass: '#003049', opacity: 0.45 },
                sunset: { bg: '#f72585', glass: '#7209b7', opacity: 0.45 },
                forest: { bg: '#2d6a4f', glass: '#1b4332', opacity: 0.45 },
                midnight: { bg: '#2b2d42', glass: '#1a1a2e', opacity: 0.45 },
                lavender: { bg: '#6a4c93', glass: '#3d2b5c', opacity: 0.45 },
                candy: { bg: '#ff6b9d', glass: '#c44569', opacity: 0.45 }
            };

            const preset = presets[name];
            if (!preset) return;

            document.getElementById('bgColorPicker').value = preset.bg;
            document.getElementById('bgColorInput').value = preset.bg;
            document.getElementById('glassColorPicker').value = preset.glass;
            document.getElementById('glassColorInput').value = preset.glass;
            document.getElementById('glassOpacity').value = preset.opacity;
            document.getElementById('glassOpacityValue').textContent = preset.opacity.toFixed(2);

            updateBackground(preset.bg);
            applyGlassStyles(preset.glass, preset.opacity);
            showSuccess('Theme "' + name + '" applied!');
        };

        // ====================================================================
        //  REGISTER С ПОЛНОЙ ВАЛИДАЦИЕЙ
        // ====================================================================
        document.getElementById('regBtn').addEventListener('click', async function () {
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            // 1. Проверка на пустые поля
            if (!email || !password) {
                showError('⚠️ Please fill in all fields!');
                return;
            }

            // 2. Проверка email на валидность (формат)
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('⚠️ Please enter a valid email address!');
                return;
            }

            // 3. Проверка пароля (минимум 6 символов)
            if (password.length < 6) {
                showError('⚠️ Password must be at least 6 characters!');
                return;
            }

            // 4. Проверка на сложность пароля (опционально)
            if (!/[A-Z]/.test(password)) {
                showWarning('⚠️ Password should contain at least one uppercase letter');
                // Не блокируем, просто предупреждаем
            }
            if (!/[0-9]/.test(password)) {
                showWarning('⚠️ Password should contain at least one number');
                // Не блокируем, просто предупреждаем
            }

            this.disabled = true;
            this.textContent = 'Sending...';

            const { data, error } = await supabase.auth.signUp({
                email,
                password,
                options: {
                    emailRedirectTo: window.location.origin + '/profile-global.html'
                }
            });

            this.disabled = false;
            this.textContent = 'Sign Up';

            if (error) {
                showError('Registration error: ' + error.message);
                return;
            }

            if (data.user && data.user.identities && data.user.identities.length === 0) {
                showWarning('User already exists! Try logging in.');
                switchToLogin();
                document.getElementById('login-email').value = email;
                return;
            }

            if (data.user) {
                showSuccess('📧 Confirmation email sent! Check your inbox.');
                showInfo('Please confirm your email before logging in.');
                switchToLogin();
                document.getElementById('login-email').value = email;
            }
        });

        // ====================================================================
        //  LOGIN С ВАЛИДАЦИЕЙ
        // ====================================================================
        document.getElementById('loginBtn').addEventListener('click', async function () {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            // 1. Проверка на пустые поля
            if (!email || !password) {
                showError('⚠️ Please fill in all fields!');
                return;
            }

            // 2. Проверка email на валидность
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('⚠️ Please enter a valid email address!');
                return;
            }

            // 3. Проверка пароля (минимум 6 символов)
            if (password.length < 6) {
                showError('⚠️ Password must be at least 6 characters!');
                return;
            }

            this.disabled = true;
            this.textContent = 'Logging in...';

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            this.disabled = false;
            this.textContent = 'Login';

            if (error) {
                if (error.message.includes('Email not confirmed')) {
                    showError('❌ Email not confirmed! Check your inbox.');
                } else if (error.message.includes('Invalid login credentials')) {
                    showError('❌ Invalid email or password!');
                } else {
                    showError('Login error: ' + error.message);
                }
                return;
            }

            if (data.user) {
                showSuccess('Welcome, ' + email + '! 🎉');
                window.location.href = 'profile-global.html';
            }
        });

        // ====================================================================
        //  REMEMBER ME — СОХРАНЯЕМ СОСТОЯНИЕ
        // ====================================================================
        const rememberCheckbox = document.getElementById('rememberMe');

        // Восстанавливаем состояние
        if (localStorage.getItem('rememberMe') === 'true') {
            rememberCheckbox.checked = true;
        }

        rememberCheckbox.addEventListener('change', function () {
            if (this.checked) {
                localStorage.setItem('rememberMe', 'true');
                // Сохраняем email
                const email = document.getElementById('login-email').value;
                if (email) {
                    localStorage.setItem('savedEmail', email);
                }
                showSuccess('✅ "Remember me" включён!');
            } else {
                localStorage.removeItem('rememberMe');
                localStorage.removeItem('savedEmail');
                showInfo('🔓 "Remember me" выключен');
            }
        });

        // Восстанавливаем email, если "Remember me" был включён
        if (localStorage.getItem('rememberMe') === 'true') {
            const savedEmail = localStorage.getItem('savedEmail');
            if (savedEmail) {
                document.getElementById('login-email').value = savedEmail;
            }
        }

        // ====================================================================
        //  FORGOT PASSWORD
        // ====================================================================
        document.getElementById('forgotPassword').addEventListener('click', function (e) {
            window.location.href = 'forgot-password-global.html';
        });

        // ====================================================================
        //  LANGUAGES — ПЕРЕКЛЮЧЕНИЕ (ПО КРУГУ)
        // ====================================================================

        // Все языки из lang.js (будут загружены из внешнего файла)
        let currentLang = localStorage.getItem('lang') || 'en';

        // Функция переключения языка (по кругу)
        window.toggleLang = function () {
            // Получаем все языки из глобальной переменной translations (из lang.js)
            if (typeof translations !== 'undefined') {
                const langCodes = Object.keys(translations);
                const currentIndex = langCodes.indexOf(currentLang);
                const nextIndex = (currentIndex + 1) % langCodes.length;
                currentLang = langCodes[nextIndex];
                localStorage.setItem('lang', currentLang);
                updateLanguage();
            } else {
                // Если translations ещё не загружена — просто переключаем между en и ru
                currentLang = currentLang === 'en' ? 'ru' : 'en';
                localStorage.setItem('lang', currentLang);
                updateLanguageSimple();
            }
        };

        // Простое обновление языка (без translations)
        function updateLanguageSimple() {
            const langBtn = document.getElementById('langToggle');
            if (langBtn) {
                langBtn.textContent = currentLang.toUpperCase();
            }
            // Показываем уведомление
            if (typeof showToast === 'function') {
                showToast('🌍 Language: ' + currentLang.toUpperCase(), 'info');
            }
        }

        // Обновление языка (с translations)
        function updateLanguage() {
            if (typeof translations !== 'undefined' && translations[currentLang]) {
                const t = translations[currentLang];
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key] !== undefined) {
                        if (el.tagName === 'INPUT' && el.hasAttribute('placeholder')) {
                            el.placeholder = t[key];
                        } else {
                            el.textContent = t[key];
                        }
                    }
                });
            }

            const langBtn = document.getElementById('langToggle');
            if (langBtn) {
                langBtn.textContent = currentLang.toUpperCase();
            }
        }

        // ====================================================================
        //  START
        // ====================================================================
        checkUserAndRedirect();

        // Инициализация языка
        const savedLang = localStorage.getItem('lang') || 'en';
        currentLang = savedLang;

        // Ждём загрузку lang.js
        setTimeout(() => {
            if (typeof translations !== 'undefined') {
                updateLanguage();
            } else {
                updateLanguageSimple();
            }
        }, 100);

        // Настройка кнопки языка
        const langBtn = document.getElementById('langToggle');
        if (langBtn) {
            langBtn.textContent = currentLang.toUpperCase();
            langBtn.addEventListener('click', function (e) {
                e.preventDefault();
                window.toggleLang();
            });
        }

        console.log('✅ Loaded successfully!');
        console.log('🔐 Remember me & Forgot password с анимацией и синим подчёркиванием!');
    </script>
</body>

</html>
