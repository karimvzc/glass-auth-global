<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script src="lang.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Roboto", sans-serif;
        }

        .custom-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 12px;
            color: #fff;
            font-weight: 500;
            z-index: 9999;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideInRight 0.4s ease;
            backdrop-filter: blur(10px);
            font-size: 15px;
        }

        .custom-toast.success {
            background: rgba(34, 197, 94, 0.9);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .custom-toast.error {
            background: rgba(239, 68, 68, 0.9);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .custom-toast.warning {
            background: rgba(234, 179, 8, 0.9);
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .custom-toast.info {
            background: rgba(59, 130, 246, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .custom-toast.fade-out {
            animation: slideOutRight 0.3s ease forwards;
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('123.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateX(0);
            opacity: 1;
            pointer-events: none;
        }

        .bg-color {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: background 0.8s ease, opacity 0.8s ease;
            opacity: 0;
            pointer-events: none;
        }

        .bg-color.show {
            opacity: 1;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg);
                opacity: 0;
            }
        }

        body.light-theme .wrapper {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            color: #1a1a2e;
        }

        body.light-theme .wrapper h1 {
            color: #1a1a2e;
        }

        body.light-theme .wrapper p {
            color: rgba(0, 0, 0, 0.6);
        }

        body.light-theme .input-box input {
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(0, 0, 0, 0.1);
            color: #1a1a2e;
        }

        body.light-theme .input-box input::placeholder {
            color: rgba(0, 0, 0, 0.4);
        }

        body.light-theme .input-box input:focus {
            border-color: #4f46e5;
            background: rgba(255, 255, 255, 0.9);
        }

        body.light-theme .wrapper .btn {
            background: #4f46e5;
            color: #fff;
        }

        body.light-theme .wrapper .btn:hover {
            background: #4338ca;
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.3);
        }

        body.light-theme .back-links a {
            color: #1a1a2e !important;
        }

        body.light-theme .back-links a:hover {
            color: #4f46e5 !important;
        }

        body.light-theme .lang-btn {
            color: #1a1a2e;
        }

        body.color-theme .wrapper {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        body.color-theme .wrapper .btn {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff;
            border: none;
        }

        body.color-theme .wrapper .btn:hover {
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.4);
            transform: translateY(-2px);
        }

        body.color-theme .input-box input {
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        body.color-theme .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        body.color-theme .input-box input:focus {
            border-color: #7c3aed;
            background: rgba(255, 255, 255, 0.1);
        }

        body.color-theme .back-links a {
            color: #fff !important;
        }

        body.color-theme .back-links a:hover {
            color: #a78bfa !important;
        }

        body.dark-theme .wrapper {
            background: rgba(0, 0, 0, 0.75);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .bg-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #1a0b2e, #2d1b69, #0f3460, #1a0b2e);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        .bg-gradient.show {
            opacity: 1;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            background: transparent;
            position: relative;
        }

        .wrapper {
            width: 100%;
            max-width: 440px;
            margin: 20px auto;
            padding: 40px 30px 35px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            color: #ffffff;
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(-60px) scale(0.97);
            animation: wrapperSlideDown 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transition: all 0.6s ease;
        }

        @keyframes wrapperSlideDown {
            0% {
                opacity: 0;
                transform: translateY(-60px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .wrapper h1 {
            opacity: 0;
            animation: contentFadeIn 0.5s ease 0.25s forwards;
        }

        .wrapper .subtitle {
            opacity: 0;
            animation: contentFadeIn 0.5s ease 0.35s forwards;
        }

        .wrapper .input-box {
            opacity: 0;
            animation: contentFadeIn 0.5s ease 0.45s forwards;
        }

        .wrapper .btn {
            opacity: 0;
            animation: contentFadeIn 0.5s ease 0.55s forwards;
        }

        .wrapper .back-links {
            opacity: 0;
            animation: contentFadeIn 0.5s ease 0.65s forwards;
        }

        .success-message {
            opacity: 0;
            animation: contentFadeIn 0.5s ease 0.45s forwards;
        }

        @keyframes contentFadeIn {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .wrapper h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }

        .wrapper .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .input-box {
            width: 100%;
            height: 50px;
            margin-bottom: 22px;
            position: relative;
        }

        .input-box input {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.06) !important;
            border: 2px solid rgba(255, 255, 255, 0.25);
            outline: none;
            border-radius: 40px;
            font-size: 16px;
            color: #fff;
            padding: 0 24px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-box input:-webkit-autofill,
        .input-box input:-webkit-autofill:hover,
        .input-box input:-webkit-autofill:focus,
        .input-box input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.3) inset !important;
            -webkit-text-fill-color: #ffffff !important;
            background: rgba(0, 0, 0, 0.3) !important;
            border-color: rgba(255, 255, 255, 0.25) !important;
        }

        .input-box input:focus {
            border-color: #4f46e5;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
            transform: scale(1.02);
        }

        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .wrapper .btn {
            width: 100%;
            height: 50px;
            background: #4f46e5;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            transition: all 0.3s ease;
            display: block;
            margin-bottom: 20px;
        }

        .wrapper .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.3);
        }

        .wrapper .btn:active {
            transform: scale(0.96);
        }

        .wrapper .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .back-links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
        }

        .back-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
            position: relative;
            display: inline-block;
        }

        .back-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #4f46e5;
            transition: width 0.3s ease;
        }

        .back-links a:hover {
            color: #a5b4fc;
        }

        .back-links a:hover::after {
            width: 100%;
        }

        body.color-theme .back-links a::after {
            background: #a78bfa;
        }

        body.color-theme .back-links a:hover {
            color: #c4b5fd;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 15px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 12px;
            color: #4ade80;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        .success-message.show {
            display: block;
            animation: fadeSlide 0.4s ease forwards;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #fff;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 44px;
            justify-content: center;
            font-weight: 600;
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        body.light-theme .lang-btn {
            color: #1a1a2e;
        }

        .settings-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
            flex-wrap: wrap;
            justify-content: center;
        }

        .settings-panel .theme-buttons {
            display: flex;
            gap: 8px;
        }

        .settings-panel .theme-buttons button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .settings-panel .theme-buttons button:hover {
            transform: scale(1.15);
        }

        .settings-panel .divider {
            width: 1px;
            height: 30px;
            background: rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .wrapper {
                padding: 30px 18px 25px;
                border-radius: 14px;
            }

            .wrapper h1 {
                font-size: 22px;
            }

            .wrapper .subtitle {
                font-size: 14px;
                margin-bottom: 24px;
            }

            .input-box {
                height: 44px;
                margin-bottom: 16px;
            }

            .input-box input {
                font-size: 15px;
                padding: 0 18px;
                border-radius: 30px;
            }

            .wrapper .btn {
                height: 44px;
                font-size: 15px;
            }

            .back-links a {
                font-size: 13px;
            }

            .settings-panel {
                padding: 8px 12px;
                gap: 8px;
                bottom: 10px;
                flex-wrap: wrap;
                justify-content: center;
                border-radius: 20px;
            }
        }
    </style>
</head>

<body>
    <!-- ===== BACKGROUND ===== -->
    <div class="bg-container">
        <div class="bg-gradient" id="bgGradient"></div>
        <div class="bg-image" id="bgImage"></div>
        <div class="bg-color" id="bgColor"></div>

    <!-- ===== PARTICLES ===== -->
    <div class="particles" id="particles"></div>

    <!-- ===== MAIN BLOCK ===== -->
    <div class="wrapper" id="wrapper">
        <h1 data-i18n="resetTitle">🔐 Reset Password</h1>
        <p class="subtitle" data-i18n="resetSubtitle">Enter your email and we will send you a reset link</p>

        <div class="success-message" id="successMessage" data-i18n="resetSuccess">

        <form id="resetForm">

            <button type="submit" class="btn" id="resetBtn" data-i18n="resetSend">Send reset link</button>

        <div class="back-links">
            <a href="index-global.html" id="backToLogin" data-i18n="backToLogin">← Back to Login</a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        // ====================================================================
        //  SUPABASE
        // ====================================================================
        const SUPABASE_URL = 'https://oninodnelfzadiwchxxz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uaW5vZG5lbGZ6YWRpd2NoeHh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NjU3MDUsImV4cCI6MjA5ODE0MTcwNX0.hWauqzJrKRzXRhlMJpvli3tS5_Mhm7n0O-EQtw8kwhI';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ====================================================================
        //  TOASTS
        // ====================================================================
        function showToast(message, type = 'info', duration = 3000) {
            const oldToasts = document.querySelectorAll('.custom-toast');
            oldToasts.forEach(toast => toast.remove());

            const toast = document.createElement('div');
            toast.className = `custom-toast ${type}`;
            toast.textContent = message;

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        function showSuccess(message) { showToast(message, 'success'); }
        function showError(message) { showToast(message, 'error'); }
        function showWarning(message) { showToast(message, 'warning'); }
        function showInfo(message) { showToast(message, 'info'); }

        // ====================================================================
        //  PARTICLES
        // ====================================================================
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 25;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                particle.style.animationDelay = (Math.random() * 15) + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.1;
                container.appendChild(particle);
            }
        }
        createParticles();

        // ====================================================================
        //  BACKGROUND
        // ====================================================================
        const bgImage = document.getElementById('bgImage');
        const bgColor = document.getElementById('bgColor');
        const bgGradient = document.getElementById('bgGradient');

        function restoreBackground() {
            const savedBg = localStorage.getItem('customBgColor');
            const bgHidden = localStorage.getItem('bgImageHidden');

            if (savedBg && bgHidden === 'true') {
                bgImage.classList.add('hide');
                bgColor.style.background = savedBg;
                bgColor.classList.add('show');
                bgGradient.classList.remove('show');
            } else {
                bgImage.classList.remove('hide');
                bgColor.classList.remove('show');
                if (document.body.classList.contains('color-theme')) {
                    bgGradient.classList.add('show');
                } else {
                    bgGradient.classList.remove('show');
                }
            }
        }

        function applyGlassStyles() {
            const wrapper = document.querySelector('.wrapper');
            const savedGlass = localStorage.getItem('customGlassColor');
            const savedOpacity = localStorage.getItem('customGlassOpacity');

            if (savedGlass && savedOpacity) {
                const color = savedGlass;
                const opacity = parseFloat(savedOpacity);
                const r = parseInt(color.slice(1, 3), 16);
                const g = parseInt(color.slice(3, 5), 16);
                const b = parseInt(color.slice(5, 7), 16);
                wrapper.style.background = `rgba(${r}, ${g}, ${b}, ${opacity})`;
                wrapper.style.backdropFilter = 'blur(16px)';
            }
        }

        // ====================================================================
        //  THEMES
        // ====================================================================
        window.setTheme = function(theme) {
            const body = document.body;

            body.classList.remove('dark-theme', 'light-theme', 'color-theme');

            if (theme === 'dark') {
                body.classList.add('dark-theme');
                document.getElementById('themeDark').style.borderColor = '#4f46e5';
                document.getElementById('themeLight').style.borderColor = 'transparent';
                document.getElementById('themeColor').style.borderColor = 'transparent';

                bgGradient.classList.remove('show');
                bgImage.style.background = "url('123.jpg')";
                bgImage.style.backgroundSize = 'cover';
                bgImage.style.backgroundPosition = 'center';
                bgImage.style.backgroundRepeat = 'no-repeat';
                bgImage.classList.remove('hide');
                bgColor.classList.remove('show');

            } else if (theme === 'light') {
                body.classList.add('light-theme');
                document.getElementById('themeDark').style.borderColor = 'transparent';
                document.getElementById('themeLight').style.borderColor = '#4f46e5';
                document.getElementById('themeColor').style.borderColor = 'transparent';

                bgGradient.classList.remove('show');
                bgImage.style.background = "url('123.jpg')";
                bgImage.style.backgroundSize = 'cover';
                bgImage.style.backgroundPosition = 'center';
                bgImage.style.backgroundRepeat = 'no-repeat';
                bgImage.classList.remove('hide');
                bgColor.classList.remove('show');

            } else if (theme === 'color') {
                body.classList.add('color-theme');
                document.getElementById('themeDark').style.borderColor = 'transparent';
                document.getElementById('themeLight').style.borderColor = 'transparent';
                document.getElementById('themeColor').style.borderColor = '#4f46e5';

                bgGradient.classList.add('show');
                setTimeout(() => {
                    bgImage.classList.add('hide');
                }, 50);
                bgColor.classList.remove('show');
            }

            localStorage.setItem('appTheme', theme);
            applyGlassStyles();
        };

        (function() {
            const savedTheme = localStorage.getItem('appTheme') || 'dark';
            window.setTheme(savedTheme);
        })();

        // ====================================================================
        //  FORGOT PASSWORD
        // ====================================================================
        const resetForm = document.getElementById('resetForm');
        const resetBtn = document.getElementById('resetBtn');
        const successMessage = document.getElementById('successMessage');

        resetForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('resetEmail').value;

            if (!email) {
                showError('Please enter your email!');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = '⏳ Sending...';

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password-global.html'
                });

                if (error) {
                    showError('Error: ' + error.message);
                } else {
                    successMessage.classList.add('show');
                    resetForm.style.display = 'none';
                    showSuccess('✅ Reset link sent to your email!');
                }
            } catch (error) {
                showError('Error: ' + error.message);
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Send reset link';
            }
        });

        // ====================================================================
        //  START
        // ====================================================================
        restoreBackground();
        applyGlassStyles();

        console.log('✅ Forgot password page loaded!');
    </script>
</body>

</html>я
